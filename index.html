<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="images/meta.png" />
  <title>Osiyo Xalqaro Universitet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-10">
  <div class="page-bg" aria-hidden="true"></div>

  <div class="ios-toast-stack" id="ios-toast-stack" aria-live="polite"></div>

  <div class="page-wrap max-w-7xl w-full flex flex-col lg:flex-row items-center lg:items-center justify-between gap-10 lg:gap-14">
    <div class="content-panel w-full lg:w-[52%] flex flex-col justify-center">
      <header class="site-header">
        <img src="images/logo3.svg" alt="OXU Logo" class="site-logo">
      </header>

      <div class="hero-block">
        <h1 class="hero-title">
          <span class="hero-title-line1">
            <span id="oxu-prefix" class="hero-prefix"></span><span id="oxu-title-lead" class="hero-sub"></span>
          </span>
          <span id="oxu-title-line" class="hero-sub hero-sub--line"></span>
        </h1>
        <p id="subtitle" class="hero-text"></p>
      </div>

      <div class="form-card">
        <form id="main-form" class="form-fields" novalidate>
          <input autocomplete="off" type="text" id="name-input" name="name" placeholder="" required class="form-input">
          <input autocomplete="off" type="tel" id="phone-input" name="phone" placeholder="" required class="form-input">
          <select id="filial-select" class="form-select" required>
            <option value="" disabled selected hidden>Filialni tanlang</option>
            <option value="Bukhara">Buxoro kampusi</option>
            <option value="Khorazm">Xorazm kampusi</option>
          </select>
          <select id="speciality-select" class="form-select" required>
            <option value="" disabled selected hidden>Qaysi yo‘nalishga topshirmoqchisiz?</option>
          </select>
          <button type="submit" id="send-btn" class="btn-submit">
            <span id="send-btn-text"></span>
            <svg class="btn-submit-arrow" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </form>
      </div>

      <p id="note" class="form-note"></p>

      <div class="lang-switch">
        <button class="lang-btn" data-lang="uz">
          <img src="images/uz.svg" alt=""><span id="label-uz"></span>
        </button>
        <button class="lang-btn" data-lang="ru">
          <img src="images/ru.svg" alt=""><span id="label-ru"></span>
        </button>
      </div>
    </div>

    <div class="banner-col w-full lg:w-[48%] flex items-center justify-center">
      <div class="banner-carousel" id="banner-carousel" aria-label="OXU banners">
        <div class="banner-track" id="banner-track">
          <div class="banner-slide"><img src="images/banners/01.png" alt="OXU" width="2160" height="2700" fetchpriority="high" decoding="async"></div>
          <div class="banner-slide"><img src="images/banners/16.png" alt="OXU" width="2160" height="2700" decoding="async"></div>
          <div class="banner-slide"><img src="images/banners/18.png" alt="OXU" width="2160" height="2700" decoding="async"></div>
          <div class="banner-slide"><img src="images/banners/20 (2).png" alt="OXU" width="2160" height="2700" decoding="async"></div>
        </div>
        <div class="banner-indicators" id="banner-indicators" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script>
    const translations = {
      uz: {
        prefix: 'Qabul ochiq',
        titleLead: 'hoziroq',
        titleLine: 'ariza qoldiring',
        subtitle: '5 daqiqada arizangizni qoldiring, mutaxassis siz bilan bog‘lanadi',
        name: 'Ismingiz',
        phonePlaceholder: '+998 (__) ___-__-__',
        send: 'Ariza yuborish',
        note: '*Qabul Buxoro va Xorazm filiallarida olib boriladi',
        uzbek: "O'zbekcha",
        specialityPlaceholder: "Qaysi yo‘nalishga topshirmoqchisiz?",
        filialPlaceholder: "Filialni tanlang",
        russian: 'Ruscha',
        appName: 'Osiyo Xalqaro Universitet',
        toastNow: 'hozir',
        toasts: [
          { emoji: '🎓', icon: 'images/graduation-cap_1f393.png', accent: '#0025b9', title: '320 ta grant sizni kutmoqda', body: 'Grant asosida bepul o‘qish imkoniyati' },
          { emoji: '📚', icon: 'images/books_1f4da.png', accent: '#7c3aed', title: '90+ yo‘nalish', body: 'O‘zingizga mos kasbni tanlang' },
          { emoji: '🏆', icon: 'images/trophy_1f3c6.png', accent: '#f59e0b', title: 'Rektor stipendiyasi', body: 'Eng kuchli talabalar uchun maxsus stipendiya' }
        ]
      },
      ru: {
        prefix: 'Приём начался',
        titleLead: 'оставьте',
        titleLine: 'заявку прямо сейчас',
        subtitle: 'Оставьте заявку за 5 минут — с вами свяжется специалист',
        name: 'Ваше имя',
        phonePlaceholder: '+998 (__) ___-__-__',
        send: 'Отправить заявку',
        note: '*Прием проводится в филиалах Бухары и Хорезма',
        uzbek: 'Узбекский',
        specialityPlaceholder: "Выберите направление",
        filialPlaceholder: "Выберите филиал",
        russian: 'Русский',
        appName: 'Азиатский Международный Университет',
        toastNow: 'сейчас',
        toasts: [
          { emoji: '🎓', icon: 'images/graduation-cap_1f393.png', accent: '#0025b9', title: '320 грантов ждут вас', body: 'Возможность учиться бесплатно на гранте' },
          { emoji: '📚', icon: 'images/books_1f4da.png', accent: '#7c3aed', title: '90+ направлений', body: 'Выберите подходящую профессию' },
          { emoji: '🏆', icon: 'images/trophy_1f3c6.png', accent: '#f59e0b', title: 'Стипендия ректора', body: 'Специальная стипендия для лучших студентов' }
        ]
      }
    };

    let currentLang = 'uz';
    function applyLang(lang) {
      const t = translations[lang];
      document.getElementById('oxu-prefix').textContent = t.prefix;
      document.getElementById('oxu-title-lead').textContent = '\u00A0' + t.titleLead;
      document.getElementById('oxu-title-line').textContent = t.titleLine;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('name-input').placeholder = t.name;
      document.getElementById('phone-input').placeholder = t.phonePlaceholder;
      document.getElementById('send-btn-text').textContent = t.send;
      document.getElementById('note').textContent = t.note;
      document.getElementById('label-uz').textContent = t.uzbek;
      document.getElementById('label-ru').textContent = t.russian;
      document.getElementById('speciality-select').options[0].text = t.specialityPlaceholder;
      const filialSelect = document.getElementById('filial-select');
      if (filialSelect) {
        filialSelect.options[0].text = t.filialPlaceholder;
      }

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      currentLang = lang;
    }
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        applyLang(btn.dataset.lang);
        loadSpecialities();
      });
    });
    applyLang(currentLang);

    document.getElementById('phone-input').addEventListener('input', e => {
      let v = e.target.value.replace(/\D/g, '');
      if (v.startsWith('998')) v = v.slice(3);
      v = v.slice(0, 9);
      let fmt = '+998 ';
      if (v.length > 0) fmt += v.substring(0, 2);
      if (v.length >= 3) fmt += ' ' + v.substring(2, 5);
      if (v.length >= 6) fmt += '-' + v.substring(5, 7);
      if (v.length >= 8) fmt += '-' + v.substring(7, 9);
      e.target.value = fmt;
    });

    document.getElementById('main-form').addEventListener('submit', async e => {
      e.preventDefault();

      const name = document.getElementById('name-input').value.trim();
      const rawPhone = document.getElementById('phone-input').value;
      const phone = rawPhone.replace(/\D/g, '');
      const speciality = document.getElementById('speciality-select').value;
      const filial = document.getElementById('filial-select').value;

      const isUz = currentLang === 'uz';
      const showError = (msgUz, msgRu) => {
        Toastify({
          text: isUz ? msgUz : msgRu,
          duration: 3000,
          close: true,
          gravity: 'top',
          position: 'right',
          backgroundColor: '#ef4444'
        }).showToast();
      };

      if (!name) {
        showError("Ismingizni kiriting", "Введите имя");
        return;
      }

      if (!/^998\d{9}$/.test(phone)) {
        showError("Telefon raqam noto‘g‘ri", "Неправильный номер телефона");
        return;
      }

      if (!filial) {
        showError("Filialni tanlang", "Выберите филиал");
        return;
      }

      if (!speciality) {
        showError("Yo'nalishni tanlang", "Выберите направление");
        return;
      }

      try {
        await fetch('https://newapi.oxu.uz/api/courses', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullname: name, phone, filial, sort_id: speciality })
        });

        Toastify({
          text: isUz ? 'Muvaffaqiyatli yuborildi!' : 'Успешно отправлено!',
          duration: 3000,
          close: true,
          gravity: 'top',
          position: 'right',
          backgroundColor: '#22c55e'
        }).showToast();

        try {
          localStorage.setItem('oxu_lead', JSON.stringify({ ph: phone, name }));
        } catch (e) {}

        setTimeout(() => window.location.href = 'thank-you.html', 500);
      } catch (err) {
        console.error(err);
        showError("Xatolik yuz berdi", "Произошла ошибка");
      }
    });

    async function loadSpecialities() {
      const select = document.getElementById('speciality-select');
      if (!select) return;

      select.innerHTML = `<option value="" disabled selected hidden>${translations[currentLang].specialityPlaceholder}</option>`;

      try {
        const res = await fetch("https://newapi.oxu.uz/api/uz/speciality");
        const json = await res.json();
        if (!json.status || !Array.isArray(json.data)) throw new Error("Invalid response");

        json.data.forEach(faculty => {
          const group = document.createElement('optgroup');
          group.label = faculty.name;

          faculty.tranlations_ides.forEach(dir => {
            const tr = dir.translations.find(t => t.locale === currentLang);

            if (tr) {
              const option = document.createElement('option');
              option.value = dir.speciality_id;
              option.textContent = tr.title;
              group.appendChild(option);
            }
          });

          if (group.children.length > 0) {
            select.appendChild(group);
          }
        });
      } catch (err) {
        console.error("Error loading specialities:", err);
      }
    }

    loadSpecialities();

    (function initBannerCarousel() {
      const carousel = document.getElementById('banner-carousel');
      const track = document.getElementById('banner-track');
      const indicatorsWrap = document.getElementById('banner-indicators');
      const slides = track.querySelectorAll('.banner-slide');
      const total = slides.length;
      const interval = 5000;
      let current = 0;
      let timer = null;
      let touchStartX = 0;

      slides.forEach((_, i) => {
        const dot = document.createElement('span');
        dot.className = 'banner-indicator' + (i === 0 ? ' active' : '');
        indicatorsWrap.appendChild(dot);
      });

      const indicators = indicatorsWrap.querySelectorAll('.banner-indicator');

      function restartProgress(el) {
        el.style.animation = 'none';
        void el.offsetWidth;
        el.style.animation = '';
      }

      function updateIndicators() {
        indicators.forEach((el, i) => {
          el.classList.remove('active', 'passed');
          if (i < current) el.classList.add('passed');
          if (i === current) {
            el.classList.add('active');
            restartProgress(el);
          }
        });
      }

      function goTo(index) {
        current = (index + total) % total;
        track.style.transform = `translate3d(-${current * 100}%, 0, 0)`;
        updateIndicators();
        resetTimer();
      }

      function next() {
        goTo(current + 1);
      }

      function resetTimer() {
        clearInterval(timer);
        timer = setInterval(next, interval);
      }

      carousel.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
      }, { passive: true });

      carousel.addEventListener('touchend', e => {
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 40) goTo(current + (diff > 0 ? 1 : -1));
      }, { passive: true });

      carousel.addEventListener('click', e => {
        const rect = carousel.getBoundingClientRect();
        const x = e.clientX - rect.left;
        if (x < rect.width * 0.35) goTo(current - 1);
        else if (x > rect.width * 0.65) goTo(current + 1);
      });

      resetTimer();
    })();

    (function initIosToasts() {
      const stack = document.getElementById('ios-toast-stack');
      if (!stack) return;

      const appleEmoji = code => `https://emojicdn.elk.sh/${encodeURIComponent(code)}?style=apple`;

      function buildToast(item, t) {
        const el = document.createElement('div');
        el.className = 'ios-toast';
        el.innerHTML = `
          <div class="ios-toast-icon" style="--accent:${item.accent}">
            <img src="${item.icon || appleEmoji(item.emoji)}" alt="" loading="lazy" draggable="false"
                 onerror="this.style.display='none';this.insertAdjacentText('afterend','${item.emoji}');this.parentNode.classList.add('ios-toast-icon--text')">
          </div>
          <div class="ios-toast-body">
            <div class="ios-toast-top">
              <span class="ios-toast-app">${t.appName}</span>
              <span class="ios-toast-time">${t.toastNow}</span>
            </div>
            <div class="ios-toast-title">${item.title}</div>
            <div class="ios-toast-text">${item.body}</div>
          </div>`;
        return el;
      }

      const MAX_VISIBLE = 3;
      const OFFSET = 12;
      const SCALE_STEP = 0.06;

      function restack() {
        const items = Array.from(stack.querySelectorAll('.ios-toast'))
          .filter(el => !el.classList.contains('leaving'));
        const ordered = items.slice().reverse();

        ordered.forEach((el, depth) => {
          el.style.zIndex = String(100 - depth);
          if (depth >= MAX_VISIBLE) {
            el.style.opacity = '0';
            el.style.pointerEvents = 'none';
            el.style.transform =
              `translateY(${(MAX_VISIBLE - 1) * OFFSET}px) scale(${1 - (MAX_VISIBLE - 1) * SCALE_STEP})`;
            return;
          }
          el.style.opacity = '1';
          el.style.pointerEvents = depth === 0 ? 'auto' : 'none';
          el.style.transform =
            `translateY(${depth * OFFSET}px) scale(${1 - depth * SCALE_STEP})`;
        });
      }

      function dismiss(el) {
        if (!el || el.classList.contains('leaving')) return;
        el.classList.add('leaving');
        el.style.pointerEvents = 'none';
        el.style.opacity = '0';
        el.style.transform = 'translateY(-140%) scale(0.9)';
        el.addEventListener('transitionend', () => {
          el.remove();
          restack();
        }, { once: true });
      }

      function dismissAll() {
        const items = Array.from(stack.querySelectorAll('.ios-toast'))
          .filter(el => !el.classList.contains('leaving'));
        items.slice().reverse().forEach((el, i) => {
          setTimeout(() => dismiss(el), i * 240);
        });
      }

      function showToasts() {
        const t = translations[currentLang];
        if (!t || !Array.isArray(t.toasts)) return;

        const step = 850;
        const startDelay = 500;

        t.toasts.forEach((item, i) => {
          setTimeout(() => {
            const el = buildToast(item, t);
            el.style.opacity = '0';
            el.style.transform = 'translateY(-140%) scale(0.9)';
            stack.appendChild(el);
            el.addEventListener('click', () => dismiss(el));
            requestAnimationFrame(() => requestAnimationFrame(restack));
          }, startDelay + i * step);
        });

        const lastArrive = startDelay + (t.toasts.length - 1) * step;
        setTimeout(dismissAll, lastArrive + 4500);
      }

      if (document.readyState === 'complete') {
        showToasts();
      } else {
        window.addEventListener('load', showToasts, { once: true });
      }
    })();
  </script>
</body>
</html>
